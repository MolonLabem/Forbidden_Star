<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Forbidden Stars - Фракции</title>

    <link rel="stylesheet"
          href="style/styles.css">

    <link rel="icon"
          type="image/x-icon"
          href="favicon.ico">

    <link rel="apple-touch-icon"
          href="favicon.ico">

    <link rel="manifest"
          href="site.webmanifest">
</head>

<body>

    <div id="loading-spinner" class="spinner"></div>

    <div id="expansion-tabs"></div>

    <div id="faction-tabs"></div>

    <div id="cards-tabs"></div>

    <div id="cards-container"></div>

    <div id="faq-container" class="faq-container">

        <div class="faq-page-shell">

            <div class="faq-header-panel">

                <div class="faq-search-wrap">

                    <input id="faq-search-input"
                           class="faq-search-box"
                           type="text"
                           placeholder="Поиск по FAQ..." />

                    <div id="faq-search-meta"
                         class="faq-search-meta">

                        Показан полный FAQ

                    </div>

                </div>

            </div>

            <main id="faq-content"
                  class="faq-content"
                  aria-live="polite">
            </main>

        </div>

    </div>

    <script src="script/script.js"></script>

</body>
</html>
